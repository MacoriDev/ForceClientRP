name: build

on:
  workflow_dispatch:
  push:
    branches: [ main, macori ]

jobs:
  android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"
      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_HOME/ndk/27.2.12479018/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-23 \
            -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: ForceServerGlobalResource-arm64-v8a
          path: build/libForceServerGlobalResource.so
